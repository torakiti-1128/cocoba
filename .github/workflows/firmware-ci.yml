name: ファームウェア CI

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'src/firmware/**'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'src/firmware/**'

jobs:
  build:
    name: PlatformIO ビルド
    runs-on: ubuntu-latest

    steps:
    - name: チェックアウト
      uses: actions/checkout@v4

    - name: pip のキャッシュ
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: PlatformIO のキャッシュ
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio

    - name: Python のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: PlatformIO のインストール
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: ファームウェアのビルド
      run: |
        cd src/firmware
        # platformio.ini が存在する場合のみビルドを実行
        if [ -f platformio.ini ]; then pio run; fi
