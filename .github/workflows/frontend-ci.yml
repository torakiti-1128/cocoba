name: フロントエンド CI

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'src/frontend/**'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'src/frontend/**'

defaults:
  run:
    working-directory: src/frontend

jobs:
  build:
    name: ビルドとチェック
    runs-on: ubuntu-latest

    steps:
    - name: チェックアウト
      uses: actions/checkout@v4

    - name: Node.js のセットアップ
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/frontend/package-lock.json

    - name: 依存関係のインストール
      run: npm ci

    - name: リンターの実行
      run: npm run lint

    - name: ビルドの実行
      run: npm run build
