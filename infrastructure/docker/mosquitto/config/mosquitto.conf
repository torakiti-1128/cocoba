# Eclipse Mosquitto 設定ファイル
# 詳細は mosquitto.conf(5) を参照してください。

# 永続性 (Persistence)
persistence true
persistence_location /mosquitto/data/

# ログ (Log)
log_dest file /mosquitto/log/mosquitto.log
log_type all

# リスナー (ローカルネットワーク)
listener 1883
allow_anonymous true

# WebSocket リスナー (デバッグ・Web用)
listener 9001
protocol websockets
